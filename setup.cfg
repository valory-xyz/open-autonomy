# Minimal stub. `aea generate-all-protocols` (in open-aea) hardcodes
# `--settings-path=setup.cfg` when invoking isort against generated
# protocol code, so this file must exist with a usable [isort] section
# even after the linter migration to tomte canonical.
[isort]
profile = black
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
line_length = 88
order_by_type = False
case_sensitive = True
lines_after_imports = -1
known_first_party = autonomy,deployments
known_packages = packages
known_local_folder = tests
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,PACKAGES,LOCALFOLDER
