[tool.poetry]
name = "open-autonomy"
version = "0.21.18"
description = "Open Autonomy Framework"
authors = ["developer-valory <develope@valory.xyz>"]
license = "Apache-2.0 license"
packages = [{include = "autonomy"}, {include = "packages"}]

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
# Core runtime
Flask = ">=3.1.0,<4.0.0"
open-aea = { version = "==2.2.1", extras = ["all"] }
watchdog = ">=2.1.6"
pytest = "==8.4.2"
Werkzeug = ">=3.1.0,<4.0.0"
docker = "==7.1.0"
hexbytes = "*"
protobuf = ">=5,<6"
gql = "==3.5.0"
aiohttp = ">=3.8.5,<4.0.0"
typing_extensions = ">=3.10.0.2,<=4.15.0"
# CLI deps (also bundled into the default install)
click = ">=8.1.0,<9"
open-aea-cli-ipfs = "==2.2.1"
coverage = ">=6.4.4,<8.0.0"
# Optional plugins — declared via extras below.
# HWI kept out of [all]: its transitive chain (ledgerwallet ->
# hidapi + Pillow) has no pre-built armv7 wheels, breaking
# multi-platform Docker image builds.
open-aea-ledger-ethereum = {version = "==2.2.1", optional = true}
open-aea-ledger-ethereum-hwi = {version = "==2.2.1", optional = true}

[tool.poetry.extras]
cli = [
    "click",
    "open-aea-cli-ipfs",
    "pytest",
    "coverage",
]
chain = [
    "open-aea-ledger-ethereum",
]
hwi = [
    "open-aea-ledger-ethereum-hwi",
]
all = [
    "click",
    "open-aea-cli-ipfs",
    "pytest",
    "coverage",
    "open-aea-ledger-ethereum",
]

[tool.poetry.scripts]
autonomy = "autonomy.cli:cli"

[tool.poetry.group.dev.dependencies]
tomte = { extras = ["tox", "docs"], version = "==0.6.5" }
mkdocs-monorepo-plugin = "^1.0.5"
open-aea-ci-helpers = "==2.2.1"
open-aea-dev-helpers = "==2.2.1"
# Test-only runtime deps for `packages/valory/**` when `make test`
# runs pytest directly (outside tox). Kept out of the main deps so
# the published wheel doesn't ship them. `tox -e <env>` has its own
# lists in tox.ini.
py-ecc = "==8.0.0"
pycryptodome = "==3.20.0"
hypothesis = "==6.21.6"
pytest-asyncio = "*"


[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
